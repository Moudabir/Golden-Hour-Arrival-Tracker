
<h2 class="sr-only">Golden Hour VIP arrival tracker — three upcoming guests with live countdowns, state alerts, and check-in controls for Selman Marrakech front desk</h2>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }
.blink { animation: blink 1.15s ease-in-out infinite; }
:root{
  --bg:#0d0c0b;
  --color-text-primary:#FFFFFF;
  --color-text-secondary:#BFBFBF;
  --color-background-primary:#1b1b1d;
  --color-background-secondary:#0f1113;
  --color-background-danger: rgba(185,74,74,0.08);
  --color-background-warning: rgba(202,168,39,0.06);
  --color-background-success: rgba(42,166,91,0.06);
  --color-border-danger: rgba(185,74,74,0.75);
  --color-border-warning: rgba(202,168,39,0.75);
  --color-border-secondary: rgba(255,255,255,0.06);
  --color-border-tertiary: rgba(255,255,255,0.04);
  --color-border-success: rgba(42,166,91,0.75);
  --color-text-danger:#e6a4a4;
  --color-text-warning:#e7c85a;
  --color-text-success:#8fe0a6;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background:linear-gradient(180deg,#0b0a09 0%,#12100f 100%);
  color:var(--color-text-primary);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding:20px;
}
.tracker{max-width:960px;margin:0 auto;padding:18px}
.tracker-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
.tracker-meta{font-size:12px;color:var(--color-text-secondary);margin:0 0 4px;letter-spacing:.06em}
.tracker-title{font-size:22px;margin:0;font-weight:600;color:var(--color-text-primary)}
.clock{font-size:13px;color:var(--color-text-secondary);font-variant-numeric:tabular-nums}
.cards-wrap{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.card{display:flex;overflow:hidden;border-radius:var(--border-radius-lg);box-shadow:0 8px 22px rgba(1,3,8,0.6);border:0.5px solid rgba(255,255,255,0.03);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(0,0,0,0.55)}
.card .stripe{width:6px;flex-shrink:0}
.card-body{flex:1;padding:14px 18px;display:flex;gap:14px;align-items:center;min-width:0}
.guest-info{flex:1;min-width:0}
.guest-name{font-size:15px;font-weight:600;margin:0 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--color-text-primary)}
.guest-meta{font-size:13px;color:var(--color-text-secondary);margin:0 0 6px}
.guest-eta{font-size:12px;color:var(--color-text-secondary);margin:0}
.timer{width:92px;text-align:center;flex-shrink:0}
.time{font-size:28px;font-weight:600;margin:0;font-variant-numeric:tabular-nums;line-height:1}
.status-label{font-size:10px;letter-spacing:.05em;margin:6px 0 0}
.btn{font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--color-text-primary);cursor:pointer;transition:all .14s ease}
.btn:hover{transform:translateY(-1px)}
.btn-check{background:rgba(255,255,255,0.03)}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}
.btn-add{width:100%;padding:12px;border-radius:999px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--color-text-secondary);font-weight:600}
.add-form{display:none;margin-top:12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:6px}
.text-input{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);padding:10px 12px;font-size:13px;width:100%}
.log-section{display:none;margin-top:18px}
.log-item{background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.blink{animation:blink 1.15s ease-in-out infinite}
@media (max-width:640px){.card-body{padding:12px}.timer{width:80px}.tracker{padding:12px}}
</style>

<div class="tracker">
  <div class="tracker-header">
    <div>
      <p class="tracker-meta">Selman Marrakech - Front desk</p>
      <h3 class="tracker-title">Golden hour tracker</h3>
    </div>
    <span id="clock" class="clock"></span>
  </div>

  <p id="no-arr" style="display:none;text-align:center;padding:2rem 0;color:var(--color-text-secondary);font-size:14px;">No upcoming arrivals — add a VIP below.</p>
  <div id="cards-wrap" class="cards-wrap"></div>

  <div style="margin-top:12px;">
    <button id="add-toggle-btn" onclick="toggleAdd()" class="btn-add">+ Add VIP arrival</button>
  </div>

  <div id="add-form" class="add-form">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px;color:var(--color-text-primary);">New arrival</p>
    <div class="form-row">
      <div>
        <label class="label">Guest name</label>
        <input id="f-name" type="text" placeholder="Mr. & Mrs. Smith" class="text-input">
      </div>
      <div>
        <label class="label">ETA</label>
        <input id="f-time" type="time" class="text-input">
      </div>
    </div>
    <div class="form-row" style="margin-bottom:12px;">
      <div>
        <label class="label">Room / Suite</label>
        <input id="f-room" type="text" placeholder="Atlas Suite 12" class="text-input">
      </div>
      <div>
        <label class="label">Category</label>
        <input id="f-type" type="text" placeholder="Pool Villa" class="text-input">
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="addArrival()" class="btn" style="flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);">Add to tracker</button>
      <button onclick="toggleAdd()" class="btn btn-ghost">Cancel</button>
    </div>
  </div>

  <div id="log-section" class="log-section">
    <p style="font-size:11px;letter-spacing:.06em;color:var(--color-text-secondary);margin:0 0 8px;">Completed check-ins</p>
    <div id="log-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>
</div>

<script>
const arrivals = [
  {id:1, name:"Mr. & Mrs. Al-Rashidi", room:"Atlas Suite 12", type:"Junior Suite", eta:Date.now()+8*60*1000},
  {id:2, name:"Ms. Chen Wei", room:"Riad Pool Villa 3", type:"Pool Villa", eta:Date.now()+26*60*1000},
  {id:3, name:"Lord & Lady Pemberton", room:"Prestige Room 07", type:"Prestige Room", eta:Date.now()+63*60*1000},
];
const checkedIn=[], prevSt={};
let nextId=4, editingId=null;

const ST = {
  overdue: {bg:'var(--color-background-danger)', bo:'0.5px solid var(--color-border-danger)', stripe:'var(--color-text-danger)', tc:'var(--color-text-danger)', lbl:'Overdue', blink:true},
  critical:{bg:'var(--color-background-danger)', bo:'0.5px solid var(--color-border-danger)', stripe:'var(--color-text-danger)', tc:'var(--color-text-danger)', lbl:'Arriving now', blink:true},
  warning: {bg:'var(--color-background-warning)',bo:'0.5px solid var(--color-border-warning)',stripe:'var(--color-text-warning)',tc:'var(--color-text-warning)',lbl:'30-min window',blink:false},
  normal:  {bg:'var(--color-background-primary)', bo:'0.5px solid var(--color-border-tertiary)',stripe:'var(--color-border-secondary)',tc:'var(--color-text-primary)',lbl:'Upcoming',blink:false},
};

function getState(ms){
  if(ms<=0) return 'overdue';
  const m=ms/60000;
  if(m<=10) return 'critical';
  if(m<=30) return 'warning';
  return 'normal';
}

function fmt(ms){
  const a=Math.abs(ms),m=Math.floor(a/60000),s=Math.floor((a%60000)/1000);
  return (ms<0?'-':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function fmtETA(ts){
  return new Date(ts).toLocaleTimeString('fr-MA',{hour:'2-digit',minute:'2-digit'});
}

function timeVal(ts){
  const d=new Date(ts);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function inp(id,val,ph){
  return `<input id="${id}" type="text" value="${val||''}" placeholder="${ph||''}" class="text-input">`;
}

function buildNormal(a,state){
  const s=ST[state], ms=a.eta-Date.now();
  return `
<div class="stripe" style="background:${s.stripe};border-radius:var(--border-radius-lg) 0 0 var(--border-radius-lg);"></div>
<div class="card-body">
  <div class="guest-info">
    <p class="guest-name">${a.name}</p>
    <p class="guest-meta">${a.room} · <span>${a.type}</span></p>
    <p class="guest-eta">ETA ${fmtETA(a.eta)}</p>
  </div>
  <div class="timer">
    <p id="tmr-${a.id}" class="time ${s.blink?'blink':''}" style="color:${s.tc}">${fmt(ms)}</p>
    <p id="lbl-${a.id}" class="status-label" style="color:${s.tc}">${s.lbl}</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
    <button onclick="checkIn(${a.id})" class="btn btn-check">Check-in</button>
    <button onclick="startEdit(${a.id})" class="btn btn-ghost">Edit</button>
  </div>
</div>`;
}

function buildEdit(a){
  const state=getState(a.eta-Date.now()), s=ST[state];
  return `
<div class="stripe" style="background:${s.stripe};border-radius:var(--border-radius-lg) 0 0 var(--border-radius-lg);"></div>
<div class="card-body" style="padding:12px 16px;flex-direction:column;">
  <p style="font-size:13px;font-weight:600;margin:0 0 10px;color:var(--color-text-primary);">Edit arrival</p>
  <div class="form-row" style="margin-bottom:8px;">
    <div><label class="label">Guest name</label>${inp('e-name-'+a.id,a.name)}</div>
    <div><label class="label">ETA</label><input id="e-time-${a.id}" type="time" value="${timeVal(a.eta)}" class="text-input"></div>
  </div>
  <div class="form-row" style="margin-bottom:12px;">
    <div><label class="label">Room</label>${inp('e-room-'+a.id,a.room)}</div>
    <div><label class="label">Category</label>${inp('e-type-'+a.id,a.type)}</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button onclick="saveEdit(${a.id})" class="btn" style="flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);">Save</button>
    <button onclick="cancelEdit()" class="btn btn-ghost">Cancel</button>
  </div>
</div>`;
}

function setCardShell(el, state){
  const s=ST[state];
  el.style.background=s.bg;
  el.style.border=s.bo;
}

function initCards(){
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='';
  arrivals.sort((a,b)=>a.eta-b.eta).forEach(a=>{
    const state=getState(a.eta-Date.now());
    prevSt[a.id]=state;
    const el=document.createElement('div');
    el.id='card-'+a.id;
    el.className='card';
    setCardShell(el,state);
    el.innerHTML=buildNormal(a,state);
    wrap.appendChild(el);
  });
  document.getElementById('no-arr').style.display=arrivals.length?'none':'block';
}

function tick(){
  const clockEl=document.getElementById('clock');
  if(clockEl) clockEl.textContent=new Date().toLocaleTimeString('fr-MA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  arrivals.forEach(a=>{
    if(editingId===a.id) return;
    const ms=a.eta-Date.now(), state=getState(ms);
    const el=document.getElementById('card-'+a.id);
    if(!el) return;
    if(prevSt[a.id]!==state){
      prevSt[a.id]=state;
      setCardShell(el,state);
      el.innerHTML=buildNormal(a,state);
    } else {
      const t=document.getElementById('tmr-'+a.id);
      if(t) t.textContent=fmt(ms);
    }
  });
}

function checkIn(id){
  const idx=arrivals.findIndex(a=>a.id===id);
  if(idx<0) return;
  const a=arrivals.splice(idx,1)[0];
  if(editingId===id) editingId=null;
  delete prevSt[id];
  const el=document.getElementById('card-'+id);
  if(el) el.remove();
  const now=new Date();
  checkedIn.unshift({
    name:a.name, room:a.room, type:a.type,
    time:now.toLocaleTimeString('fr-MA',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    date:now.toLocaleDateString('fr-MA',{day:'2-digit',month:'short'})
  });
  document.getElementById('no-arr').style.display=arrivals.length?'none':'block';
  const sec=document.getElementById('log-section');
  sec.style.display='block';
  document.getElementById('log-list').innerHTML=checkedIn.map(e=>`
<div style="background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">
  <div>
    <p style="font-size:13px;font-weight:500;margin:0;color:var(--color-text-primary);">${e.name}</p>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:2px 0 0;">${e.room} · ${e.type}</p>
  </div>
  <div style="text-align:right;flex-shrink:0;">
    <p style="font-size:12px;color:var(--color-text-success);margin:0;font-weight:500;">Checked in</p>
    <p style="font-size:11px;color:var(--color-text-secondary);margin:1px 0 0;font-variant-numeric:tabular-nums;">${e.date} · ${e.time}</p>
  </div>
</div>`).join('');
}

function startEdit(id){
  editingId=id;
  const a=arrivals.find(a=>a.id===id);
  const el=document.getElementById('card-'+id);
  if(!a||!el) return;
  const state=getState(a.eta-Date.now());
  setCardShell(el,state);
  el.innerHTML=buildEdit(a);
}

function cancelEdit(){
  if(editingId===null) return;
  const a=arrivals.find(a=>a.id===editingId);
  editingId=null;
  if(!a) return;
  const state=getState(a.eta-Date.now());
  const el=document.getElementById('card-'+a.id);
  if(el){ setCardShell(el,state); el.innerHTML=buildNormal(a,state); }
}

function saveEdit(id){
  const a=arrivals.find(a=>a.id===id);
  if(!a) return;
  const n=document.getElementById('e-name-'+id);
  const t=document.getElementById('e-time-'+id);
  const r=document.getElementById('e-room-'+id);
  const tp=document.getElementById('e-type-'+id);
  if(n&&n.value) a.name=n.value;
  if(r&&r.value) a.room=r.value;
  if(tp&&tp.value) a.type=tp.value;
  if(t&&t.value){
    const [h,m]=t.value.split(':').map(Number);
    const d=new Date(); d.setHours(h,m,0,0);
    if(d.getTime()<Date.now()) d.setDate(d.getDate()+1);
    a.eta=d.getTime();
  }
  editingId=null;
  const state=getState(a.eta-Date.now());
  prevSt[id]=state;
  const el=document.getElementById('card-'+id);
  if(el){ setCardShell(el,state); el.innerHTML=buildNormal(a,state); }
}

function toggleAdd(){
  const form=document.getElementById('add-form');
  const btn=document.getElementById('add-toggle-btn');
  const show=form.style.display==='none';
  form.style.display=show?'block':'none';
  btn.textContent=show?'Cancel':'+ Add VIP arrival';
}

function addArrival(){
  const name=document.getElementById('f-name').value.trim();
  const tv=document.getElementById('f-time').value;
  if(!name||!tv) return;
  const [h,m]=tv.split(':').map(Number);
  const d=new Date(); d.setHours(h,m,0,0);
  if(d.getTime()<Date.now()) d.setDate(d.getDate()+1);
  arrivals.push({id:nextId++, name, room:document.getElementById('f-room').value.trim()||'TBD', type:document.getElementById('f-type').value.trim()||'', eta:d.getTime()});
  ['f-name','f-time','f-room','f-type'].forEach(x=>{ document.getElementById(x).value=''; });
  toggleAdd();
  initCards();
}

initCards();
setInterval(tick, 1000);
tick();
</script>
